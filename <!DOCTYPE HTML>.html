<!DOCTYPE HTML>
<html>

<head>
    <title>My Superhero Card</title>
    <style>
        body {
            background-color: darkblue;
            color: white;
            font-family: Arial, sans-serif;

        }
        .hero-name {
            font-size: 60px;
            font-weight: bold;
            color: yellow;
            text-shadow: 3px 3px orange;
    
            
        }
        .tagline {
            font-style: italic;
            color: lightblue;
            text-transform: capitalize;

        }
        .label {
            text-transform: uppercase;
            text-decoration: underline;
            color: coral;
        }
        .power {
            font-weight: bold;
            color: lightgreen;
        }
        .weakness {
            text-decorated: line-through;
            color: gray;

        }
        .badge {
            font-size: 28px;
            font-weight: bold;
            color: gold;
        }
        .made-by {
            color: coral;
            font-style: italic;
        }
    </style>
</head>

<body>
    <h1 class="hero-name">Thunder Kid</h1>

    <p class="tagline">the most powerful hero in the school</ <h2 class="label">super powers</h2>

    <p class="power">Can run faster than a cheetah</p>

    <p class="power">Can lift a school bus</p>

    <h2 class="label">weaknesses</h2>

    <p class="weakness">Maths homework</p>

    <p class="weakness">Broccoli</p>

    <p class="badge">Top Hero</p>

    <p class="made-by">Created by </p>
</body>


</html>
